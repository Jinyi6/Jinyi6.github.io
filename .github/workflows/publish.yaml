name: Deploy website to GitHub Pages

env:
  WC_HUGO_VERSION: '0.136.5'
  NODE_VERSION: '22'
  PAGEFIND_VERSION: '1.4.0'
  HUGO_CACHEDIR: ${{ github.workspace }}/.hugo_cache

on:
  # Trigger the workflow every time you push to the `main` branch
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Provide permission to clone the repo and deploy it to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build website
  build:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
          # Fetch history for Hugo's .GitInfo and .Lastmod
        fetch-depth: 0
    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: ${{ env.WC_HUGO_VERSION }}
        extended: true
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    - name: Cache Hugo resources
      uses: actions/cache@v4
      with:
        path: ${{ env.HUGO_CACHEDIR }}
        key: ${{ runner.os }}-hugo-${{ env.WC_HUGO_VERSION }}-${{ hashFiles('**/go.mod', '**/go.sum', 'config/**', 'layouts/**', 'hugoblox.yaml') }}
        restore-keys: |
          ${{ runner.os }}-hugo-${{ env.WC_HUGO_VERSION }}-
    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v5
    - name: Build with Hugo
      env:
        HUGO_ENVIRONMENT: production
      run: |
        echo "HUGO_CACHEDIR=${HUGO_CACHEDIR}"
        hugo --gc --minify
    - name: Generate Pagefind search index
      run: npx --yes pagefind@${{ env.PAGEFIND_VERSION }} --site "public"
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./public

  # Deploy website to GitHub Pages hosting
  deploy:
    if: github.repository_owner != 'HugoBlox'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
